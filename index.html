<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GKM Afrika Trading</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#FCF7EF;
}

/* NAV */
.header {
  background:#fff;
  padding:15px;
  border-bottom:1px solid #ddd;
}

.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav a {
  margin-left:20px;
  text-decoration:none;
  font-weight:bold;
  color:#333;
  cursor:pointer;
}

/* SECTIONS */
.section {
  display:none;
  padding:60px 20px;
}

.section.active {
  display:block;
}

/* HOME */
.hero {
  text-align:center;
  padding:100px 20px;
}

/* SALES */
.sales {
  background:#2e1c10;
  color:white;
  min-height:100vh;
}

/* SLIDER */
.slider {
  max-width:900px;
  margin:40px auto;
  overflow:hidden;
  border-radius:16px;
  position:relative;
}

.track {
  display:flex;
  transition:0.4s;
}

.slide {
  min-width:100%;
  height:400px;
  overflow:hidden;
}

.slide img {
  width:100%;
  height:100%;
  object-fit:cover; /* FIX STRETCH */
}

/* BUTTONS */
button {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#0008;
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
}

.prev { left:10px; }
.next { right:10px; }

/* CONTACT */
.contact {
  padding:50px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="header">
  <div class="nav">
    <h2>GKM Afrika</h2>
    <div>
      <a onclick="showSection('home')">Home</a>
      <a onclick="showSection('sales')">Sales</a>
      <a onclick="showSection('contact')">Contact Us</a>
    </div>
  </div>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="hero">
    <h1>Export African Craft & Culture</h1>
    <p>Premium hardwoods • Authentic fabrics • Tropical produce</p>
  </div>
</div>

<!-- SALES -->
<div id="sales" class="section sales">

  <h2 style="text-align:center;">Wood for Sale</h2>

  <div class="slider">
    <div class="track" id="track">

      <div class="slide"><img src="images/D.jpg"></div>
      <div class="slide"><img src="images/E.jpg"></div>
      <div class="slide"><img src="images/F.jpg"></div>
      <div class="slide"><img src="images/G.jpg"></div>
      <div class="slide"><img src="images/H.jpg"></div>
      <div class="slide"><img src="images/I.jpg"></div>
      <div class="slide"><img src="images/J.jpg"></div>
      <div class="slide"><img src="images/K.jpg"></div>

    </div>

    <button class="prev" onclick="move(-1)">‹</button>
    <button class="next" onclick="move(1)">›</button>
  </div>

</div>

<!-- CONTACT -->
<div id="contact" class="section contact">
  <h2>Contact Us</h2>
  <p>Phone: +27 72 276 5899</p>
  <p>Email: info@gkmtrading.com</p>
</div>

<script>

/* PAGE SWITCH */
function showSection(id){
  document.querySelectorAll('.section').forEach(sec => {
    sec.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

/* SLIDER (MANUAL ONLY) */
let index = 0;
const track = document.getElementById("track");
const total = 8;

function move(dir){
  index += dir;
  if(index < 0) index = total - 1;
  if(index >= total) index = 0;
  track.style.transform = `translateX(-${index * 100}%)`;
}

</script>

</body>
</html>
